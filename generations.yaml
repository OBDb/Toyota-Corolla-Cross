generations:
  - name: "First Generation (Pre-Facelift)"
    start_year: 2020
    end_year: 2024
    description: "The Toyota Corolla Cross represents the iconic nameplate's expansion into the rapidly growing compact crossover SUV segment, leveraging the Corolla's strong brand recognition while offering the higher riding position and versatility that have driven SUV popularity. Built on Toyota's TNGA-C (GA-C) platform shared with the Corolla sedan and C-HR, the Corolla Cross features conventional SUV-like styling with a practical upright profile, pronounced wheel arches, and recognizable family resemblance to Toyota's larger RAV4 and Highlander SUVs. Measuring approximately 175.6 inches in length, it slots between the smaller C-HR and larger RAV4 in Toyota's global crossover lineup. Production began in July 2020 in Thailand, with subsequent launches across Southeast Asia, Taiwan, and other global markets. Powertrain options vary by market: a 1.8-liter 2ZR-FE/FAE/FBE four-cylinder engine producing 139-140 horsepower, or a 2.0-liter M20A-FKS/FKB four-cylinder producing 169 horsepower, both paired with CVT transmissions. Hybrid variants use either a 1.8-liter 2ZR-FXE or 2.0-liter M20A-FXS engine combined with electric motors for total outputs of 121 or 196 horsepower respectively. Front-wheel drive is standard with all-wheel drive available on select models. The interior shares design elements with the regular Corolla but offers a commanding seating position and increased cargo space. Standard features include Toyota Safety Sense 2.0 driver assistance, a 7-inch or 8-inch touchscreen infotainment system with Apple CarPlay and Android Auto. The Corolla Cross has received strong safety ratings including IIHS Top Safety Pick+ (2021) and 5-star Euro NCAP (2022)."

  - name: "First Generation (Facelift)"
    start_year: 2024
    end_year: null
    description: "The facelifted Toyota Corolla Cross debuted in Thailand on 8 February 2024, followed by subsequent market-specific launches throughout 2024 and into 2025 across the globe. The facelift brings updated exterior styling including a revised front fascia, new headlight and taillight clusters (shared with the Japanese market model for many regions), and updated bumper designs. Interior enhancements include improved material quality, updated infotainment systems with larger 10.5-inch displays available, and enhanced technology features. The GR Sport trim became more widely available across markets, featuring sport-tuned suspension, unique exterior styling elements, and interior accents. Many markets transitioned to hybrid-only lineups following the facelift, particularly in Australia (July 2024), Philippines (April 2024), and Japan (May 2025). Powertrain offerings remained largely similar but with improved efficiency ratings. The facelifted model continued to be produced globally across Toyota's manufacturing network including Thailand, Taiwan, Brazil, United States (Alabama), Japan, and other facilities. The North American market received the facelift for the 2025 model year with updated styling and enhanced standard features. Toyota's commitment to electrification is reflected in the increased emphasis on hybrid variants across all markets."